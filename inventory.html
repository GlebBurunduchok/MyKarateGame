<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Інвентар | MyKarateGame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 25px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titlePulse 2s infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 5px rgba(102,126,234,0.3); transform: scale(1); }
            50% { text-shadow: 0 0 20px rgba(102,126,234,0.6); transform: scale(1.02); }
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .inventory-item {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .inventory-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);
        }

        .inventory-item.removing {
            animation: removeItem 0.3s forwards;
        }

        @keyframes removeItem {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        .inventory-item img {
            width: 80px;
            height: auto;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            margin-bottom: 10px;
        }

        .inventory-item p {
            font-weight: bold;
            color: #333;
            margin: 5px 0;
        }

        .item-count {
            position: absolute;
            top: 10px;
            right: 15px;
            background: gold;
            color: #333;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sell-button {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.2s;
            width: 80%;
        }

        .sell-button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        .sell-button:active {
            transform: scale(0.95);
        }

        .no-items-message {
            font-size: 1.2rem;
            color: #555;
            padding: 40px;
            background: rgba(255,255,255,0.6);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Кнопки навігації */
        #backButton {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            z-index: 100;
        }
        #backButton:hover { transform: translateX(-5px); background: rgba(0,0,0,0.8); }

        #coinDisplay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: gold;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            font-size: 1.2rem;
        }
        #coinDisplay img { width: 28px; filter: drop-shadow(0 0 2px gold); }

        @media (max-width: 600px) {
            body { padding: 70px 15px 30px; }
            .container { padding: 20px 15px; border-radius: 35px; }
            h1 { font-size: 1.5rem; }
            .inventory-grid { gap: 12px; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .inventory-item img { width: 60px; }
            .sell-button { font-size: 0.8rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <a href="index.html" id="backButton">← Назад</a>
    <div id="coinDisplay">
        <span id="coinCount">500</span>
        <img src="coin.png" alt="🪙">
    </div>
    <div class="container">
        <h1>🎒 Інвентар</h1>
        <div class="inventory-grid" id="inventoryGrid"></div>
        <div id="noItemsMessage" class="no-items-message" style="display: none;">Пусто... Відкрий кейс!</div>
    </div>

    <script>
        const itemPrices = {
            'Рукавиці': 600, 'Наколінники': 600, 'Кімоно': 1000,
            'Пояс': 250, 'Шолом': 250, 'Брелок': 60, 'Капці': 120,
            'Футболка': 120, 'Шапка': 120, 'Сумка': 220
        };

        function getCoins() {
            let c = parseInt(localStorage.getItem("coins"));
            if (isNaN(c)) { c = 500; localStorage.setItem("coins", c); }
            return c;
        }
        let coins = getCoins();
        let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

        function updateCoinDisplay() {
            document.getElementById("coinCount").innerText = coins;
        }

        function displayInventory() {
            const grid = document.getElementById("inventoryGrid");
            const noMsg = document.getElementById("noItemsMessage");
            if (!inventory.length) {
                grid.innerHTML = "";
                noMsg.style.display = "block";
                return;
            }
            noMsg.style.display = "none";
            const grouped = {};
            inventory.forEach(item => {
                if (grouped[item.name]) grouped[item.name].count++;
                else grouped[item.name] = { ...item, count: 1 };
            });
            grid.innerHTML = "";
            for (let name in grouped) {
                const item = grouped[name];
                const price = itemPrices[name] || 0;
                const div = document.createElement("div");
                div.className = "inventory-item";
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <p>${item.name}</p>
                    <p>💰 ${price}</p>
                    ${item.count > 1 ? `<div class="item-count">x${item.count}</div>` : ''}
                    <button class="sell-button" data-name="${item.name}">Продати</button>
                `;
                grid.appendChild(div);
            }
            document.querySelectorAll(".sell-button").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const name = btn.dataset.name;
                    const price = itemPrices[name];
                    if (!price) return;
                    const itemDiv = btn.closest(".inventory-item");
                    itemDiv.classList.add("removing");
                    await new Promise(r => setTimeout(r, 250));
                    const idx = inventory.findIndex(i => i.name === name);
                    if (idx !== -1) {
                        inventory.splice(idx, 1);
                        localStorage.setItem("inventory", JSON.stringify(inventory));
                        coins += price;
                        localStorage.setItem("coins", coins);
                        updateCoinDisplay();
                        displayInventory();
                        if (navigator.vibrate) navigator.vibrate(50);
                    }
                });
            });
        }

        updateCoinDisplay();
        displayInventory();
    </script>
</body>
</html>
