<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>СИМУЛЯТОР КЕЙСІВ</title>
    <style>
        * {
            touch-action: manipulation; /* пришвидшує реакцію на дотики */
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .menu {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item img {
            width: 150px;
            height: 150px;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        .menu-item img:hover {
            transform: scale(1.1);
        }

        .menu-item img:active {
            transform: scale(0.95);
        }

        /* Мобільна адаптація */
        @media (max-width: 600px) {
            .menu-item img {
                width: 110px;
                height: 110px;
            }
            .container {
                padding: 10px;
                margin: 0 10px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>СИМУЛЯТОР КЕЙСІВ</h1>
        <div class="menu">
            <a href="cases.html" class="menu-item">
                <img src="box.png" alt="Відкривати кейси">
            </a>
            <a href="inventory.html" class="menu-item">
                <img src="inventory_image.jpg" alt="Інвентар">
            </a>
            <a href="clicker.html" class="menu-item">
                <img src="coin_clicker.png" alt="Клікер">
            </a>
        </div>
    </div>
</body>
</html>
