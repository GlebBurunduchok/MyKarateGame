<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вибір кейсів | MyKarateGame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Лічильник монет */
        #coinDisplay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            color: gold;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #coinDisplay img {
            width: 28px;
            filter: drop-shadow(0 0 2px gold);
        }

        /* Основний контейнер */
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titlePulse 2s infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 5px rgba(102,126,234,0.3); transform: scale(1); }
            50% { text-shadow: 0 0 20px rgba(102,126,234,0.6); transform: scale(1.02); }
        }

        .menu {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.5s forwards;
            transition: all 0.3s ease;
        }

        .menu-item:nth-child(1) { animation-delay: 0.1s; }
        .menu-item:nth-child(2) { animation-delay: 0.3s; }
        .menu-item:nth-child(3) { animation-delay: 0.5s; }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-item img {
            width: 180px;
            height: 180px;
            border-radius: 40px;
            object-fit: cover;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            background: white;
            padding: 10px;
        }

        .menu-item img:hover {
            transform: translateY(-12px) rotate(2deg);
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.3);
        }

        .menu-item img:active {
            transform: scale(0.95);
            transition: transform 0.05s;
        }

        .menu-item span {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .menu-item:hover span {
            background: rgba(0,0,0,0.8);
            transform: scale(1.05);
        }

        /* Мобільна адаптація */
        @media (max-width: 600px) {
            body { padding: 15px; }
            .container { padding: 20px 15px; border-radius: 35px; }
            h1 { font-size: 1.4rem; margin-bottom: 20px; }
            .menu { gap: 20px; }
            .menu-item img { width: 130px; height: 130px; border-radius: 25px; }
            .menu-item span { font-size: 0.9rem; padding: 4px 12px; }
            #backButton, #coinDisplay { top: 15px; padding: 6px 14px; font-size: 0.9rem; }
            #coinDisplay img { width: 22px; }
        }
        /* Кнопки навігації */
.nav-buttons {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 20;
}
.nav-btn {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s ease;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}
.nav-btn:hover {
    transform: translateX(-5px);
    background: rgba(0, 0, 0, 0.8);
}
@media (max-width: 600px) {
    .nav-buttons {
        top: 10px;
        left: 10px;
    }
    .nav-btn {
        font-size: 0.8rem;
        padding: 5px 12px;
    }
}
    </style>
</head>
<body>
    <div class="nav-buttons">
    <a href="index.html" class="nav-btn">← Назад</a>
    <a href="settings.html" class="nav-btn">⚙️ Налаштування</a>
</div>
    <div id="coinDisplay">
        <span id="coinCount">0</span>
        <img src="coin.png" alt="🪙">
    </div>
    <div class="container">
        <h1>📦 ВИБЕРІТЬ КЕЙС</h1>
        <div class="menu">
            <a href="amunition.html" class="menu-item">
                <img src="case_amunition.png" alt="Амуніція">
                <span>Амуніція • 300 🪙</span>
            </a>
            <a href="accessories.html" class="menu-item">
                <img src="case_accessories.png" alt="Аксесуари">
                <span>Аксесуари • 75 🪙</span>
            </a>
            <a href="#" class="menu-item">
                <img src="case_soon.png" alt="Скоро">
                <span>Скоро...</span>
            </a>
        </div>
    </div>

    <script>
        function getCoins() {
            let coins = parseInt(localStorage.getItem("coins"));
            if (isNaN(coins)) {
                coins = 500;
                localStorage.setItem("coins", coins);
            }
            return coins;
        }

        function updateCoinDisplay() {
            const coinSpan = document.getElementById("coinCount");
            if (coinSpan) coinSpan.textContent = getCoins();
        }

        updateCoinDisplay();
    </script>
</body>
</html>
