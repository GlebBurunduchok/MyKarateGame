<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Налаштування | KarateGame</title>
    <!-- PWA мета-теги -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KarateGame">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.5s ease-out;
            transition: background 0.3s, color 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #333;
            --text-secondary: #555;
            --border-color: rgba(0,0,0,0.05);
            --shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-card: rgba(30, 30, 50, 0.95);
            --text-primary: #eee;
            --text-secondary: #aaa;
            --border-color: rgba(255,255,255,0.05);
            --shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 30px 25px;
            box-shadow: var(--shadow);
            text-align: left;
            transition: background 0.3s, box-shadow 0.3s;
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 25px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        [data-theme="dark"] h1 { background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .setting-group {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            transition: background 0.3s;
        }
        .setting-group h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text-primary); }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-row span { font-size: 1rem; color: var(--text-primary); }
        .stat-value { font-weight: bold; color: #667eea; }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #d32f2f; transform: scale(1.02); }

        /* ===== ПЛАВНИЙ ПЕРЕМИКАЧ (TOGGLE) ===== */
        .toggle {
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .toggle.active { background: #4CAF50; }
        .toggle::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle.active::after { left: 26px; }

        .nav-buttons {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }
        .nav-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .nav-btn:hover { transform: translateX(-5px); background: rgba(0,0,0,0.8); }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .footer .heart { color: #e74c3c; }
        .footer .copy { font-weight: bold; color: var(--text-primary); }

        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 1.6rem; }
            .nav-buttons { top: 10px; left: 10px; }
            .nav-btn { font-size: 0.8rem; padding: 5px 12px; }
            .setting-group { padding: 12px 15px; }
        }
    </style>
</head>
<body>
    <div class="nav-buttons">
        <a href="index.html" class="nav-btn">← Назад</a>
    </div>
    <div class="container">
        <h1>⚙️ Налаштування</h1>

        <div class="setting-group">
            <h2>📊 Статистика</h2>
            <div class="setting-row"><span>💰 Монет:</span><span class="stat-value" id="statCoins">0</span></div>
            <div class="setting-row"><span>🎒 Предметів:</span><span class="stat-value" id="statItems">0</span></div>
            <div class="setting-row"><span>📦 Відкрито кейсів:</span><span class="stat-value" id="statCases">0</span></div>
        </div>

        <div class="setting-group">
            <h2>🎨 Тема</h2>
            <div class="setting-row">
                <span>Світла / Темна</span>
                <div class="toggle" id="themeToggle"></div>
            </div>
        </div>

        <div class="setting-group">
            <h2>🎮 Дії</h2>
            <div class="setting-row">
                <span>Скинути прогрес</span>
                <button class="btn btn-danger" id="resetBtn">Скинути</button>
            </div>
        </div>

        <div class="setting-group">
            <h2>ℹ️ Про гру</h2>
            <div class="setting-row"><span>Назва:</span><span>KarateGame</span></div>
            <div class="setting-row"><span>Версія:</span><span>v2.0.0</span></div>
            <div class="setting-row"><span>Автор:</span><span>Gleb</span></div>
        </div>

        <div class="footer">
            <span class="copy">© 2026 KarateGame. Всі права захищені.</span>
            <br>
            <span style="font-size: 0.75rem; opacity: 0.6;">Created by Gleb</span>
            <br>
            <span style="font-size: 0.75rem; opacity: 0.4;">Створено з <span class="heart">❤️</span> Gleb</span>
        </div>
    </div>

    <script>
        // ===== ТЕМА =====
        function getTheme() {
            let theme = localStorage.getItem('theme');
            if (!theme) { theme = 'light'; localStorage.setItem('theme', theme); }
            return theme;
        }
        function setTheme(theme) {
            localStorage.setItem('theme', theme);
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
        }
        // Застосовуємо тему та встановлюємо стан перемикача
        setTheme(getTheme());
        const toggle = document.getElementById('themeToggle');
        if (getTheme() === 'dark') toggle.classList.add('active');

        // Обробник кліку на перемикач
        toggle.addEventListener('click', function() {
            const current = getTheme();
            const newTheme = current === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
            this.classList.toggle('active');
        });

        // ===== СТАТИСТИКА =====
        function getCoins() {
            let c = parseInt(localStorage.getItem('coins'));
            if (isNaN(c)) { c = 500; localStorage.setItem('coins', c); }
            return c;
        }
        function getInventory() {
            let inv = JSON.parse(localStorage.getItem('inventory'));
            if (!inv) { inv = []; localStorage.setItem('inventory', JSON.stringify(inv)); }
            return inv;
        }
        function getCasesOpened() {
            let c = parseInt(localStorage.getItem('casesOpened'));
            if (isNaN(c)) { c = 0; localStorage.setItem('casesOpened', c); }
            return c;
        }

        function updateStats() {
            document.getElementById('statCoins').innerText = getCoins();
            document.getElementById('statItems').innerText = getInventory().length;
            document.getElementById('statCases').innerText = getCasesOpened();
        }

        // ===== СКИДАННЯ =====
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('⚠️ Ви впевнені, що хочете скинути весь прогрес?')) {
                if (confirm('Останнє попередження: це безповоротно!')) {
                    localStorage.setItem('coins', '500');
                    localStorage.setItem('inventory', '[]');
                    localStorage.setItem('casesOpened', '0');
                    updateStats();
                    alert('Прогрес скинуто! Початковий баланс: 500 монет.');
                }
            }
        });

        updateStats();
    </script>
</body>
</html>
