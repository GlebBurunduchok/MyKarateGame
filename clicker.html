<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Клікер</title>
    <style>
        * {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 60px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .click-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .click-image:active {
            transform: scale(0.95);
        }

        #clickCount {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        #backButton {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            z-index: 1000;
        }

        #backButton:hover {
            background-color: #367c39;
        }

        #coinDisplay {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        #coinDisplay img {
            width: 30px;
            margin-left: 8px;
        }

        #coinCountDisplay {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        /* Мобільна адаптація */
        @media (max-width: 600px) {
            body {
                padding-top: 70px;
            }
            .click-image {
                width: 180px;
                height: 180px;
            }
            h1 {
                font-size: 22px;
            }
            #clickCount {
                font-size: 16px;
                margin: 0 15px 30px;
            }
            #backButton {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 14px;
            }
            #coinDisplay {
                top: 10px;
                right: 10px;
                padding: 5px 12px;
            }
            #coinCountDisplay {
                font-size: 18px;
            }
        }

        @media (max-width: 400px) {
            .click-image {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" id="backButton">Назад</a>
    <div class="container">
        <h1>КЛІКЕР</h1>
        <img src="coin.png" alt="Клацни сюди" class="click-image" id="clickImage">
        <p id="clickCount">Натисни на картинку, щоб отримати монети!</p>
        <div id="coinDisplay">
            <span id="coinCountDisplay">0</span>
            <img src="coin.png" alt="Монета">
        </div>
    </div>
    <script>
        // Функція для отримання монет з єдиним стартовим значенням 500
        function getCoins() {
            let coins = parseInt(localStorage.getItem("coins"));
            if (isNaN(coins)) {
                coins = 500;
                localStorage.setItem("coins", coins);
            }
            return coins;
        }

        function setCoins(coins) {
            localStorage.setItem("coins", coins);
        }

        function updateCoinDisplay() {
            const coinDisplaySpan = document.getElementById("coinCountDisplay");
            if (coinDisplaySpan) {
                coinDisplaySpan.textContent = getCoins();
            }
        }

        const clickImage = document.getElementById("clickImage");
        clickImage.addEventListener("click", function() {
            let coins = getCoins();
            coins++;
            setCoins(coins);
            updateCoinDisplay();
        });

        updateCoinDisplay();
    </script>
</body>
</html>
